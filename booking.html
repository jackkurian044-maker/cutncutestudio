<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://cutncutestudio.in/" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Chair | Cut N Cute Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#150F12;
    --surface:#1E1417;
    --surface-2:#271A1E;
    --gold:#C9A24A;
    --gold-soft:#E6CD8B;
    --rose:#C98BA0;
    --ivory:#F4ECE1;
    --ivory-dim:#EFE4D6;
    --muted:#A8938E;
    --line: rgba(201,162,74,0.32);
    --good:#7FAE86;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--ivory);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  h1,h2,h3,.display{ font-family:'Fraunces', serif; font-weight:500; }
  a{ color:inherit; text-decoration:none; }

  .eyebrow{
    font-size:.72rem; font-weight:600; letter-spacing:.22em;
    text-transform:uppercase; color:var(--gold);
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 6vw;
    border-bottom:1px solid var(--line);
    background:rgba(21,15,18,0.9);
    position:sticky; top:0; z-index:50; backdrop-filter:blur(10px);
  }
  .logo{
    display:flex; align-items:center; gap:.7rem;
    font-family:'Fraunces', serif; font-style:italic; font-weight:500;
    font-size:1.15rem; color:var(--ivory);
  }
  .logo-mark{
    height:40px; width:40px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-mark svg{ width:19px; height:19px; }
  .logo .wordmark small{
    display:block; font-family:'Work Sans', sans-serif; font-style:normal;
    font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    margin-top:1px;
  }
  .logo span{ color:var(--gold); }
  .back-link{
    font-size:.78rem; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); transition:color .2s ease;
  }
  .back-link:hover{ color:var(--gold-soft); }

  .wrap{ max-width:1000px; margin:0 auto; padding:0 6vw; }

  .stepper{ display:flex; align-items:center; margin:2.6rem 0 2.2rem; }
  .step{ display:flex; align-items:center; gap:9px; flex-shrink:0; }
  .step-num{
    width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:600; border:1.5px solid var(--line);
    color:var(--muted); background:var(--surface);
  }
  .step.done .step-num{ background:var(--good); border-color:var(--good); color:#111; }
  .step.active .step-num{ background:var(--gold); border-color:var(--gold); color:var(--ink); }
  .step-label{
    font-size:12.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap;
  }
  .step.active .step-label{ color:var(--ivory); }
  .step-line{ flex:1; height:1px; background:var(--line); margin:0 10px; min-width:20px; }

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    padding:2.6rem 2.4rem 2.2rem;
  }
  .card h1{ font-size:1.9rem; margin-bottom:.3rem; }
  .card .sub{ font-size:.9rem; color:var(--muted); margin-bottom:1.6rem; }
  .card .sub b{ color:var(--ivory); font-weight:600; }

  .layout{ display:grid; grid-template-columns:1fr 300px; gap:2rem; align-items:start; }
  @media(max-width:760px){ .layout{ grid-template-columns:1fr; } }

  .search{
    display:flex; align-items:center; gap:10px;
    border:1px solid var(--line); padding:12px 14px; margin-bottom:1rem;
    background:var(--surface-2);
  }
  .search input{
    border:none; outline:none; font-size:14.5px; flex:1;
    background:transparent; font-family:inherit; color:var(--ivory);
  }
  .search input::placeholder{ color:var(--muted); }
  .search svg{ flex-shrink:0; opacity:.6; }

  .pills{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:1.6rem; }
  .pill{
    border:1px solid var(--line); background:transparent; color:var(--muted);
    padding:7px 15px; border-radius:999px; font-size:11.5px; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase; cursor:pointer;
    transition:all .15s ease;
  }
  .pill:hover{ border-color:var(--gold); color:var(--gold-soft); }
  .pill.active{ background:var(--gold); border-color:var(--gold); color:var(--ink); }

  .cat-label{
    font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold); margin:1.4rem 0 .7rem;
  }
  .cat-label:first-child{ margin-top:0; }

  .svc{
    display:flex; align-items:center; gap:14px;
    padding:14px 2px; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .svc:last-child{ border-bottom:none; }
  .svc-check{
    width:21px; height:21px; border-radius:50%; border:1.5px solid var(--line);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:all .15s ease; background:var(--surface-2);
  }
  .svc.selected .svc-check{ background:var(--gold); border-color:var(--gold); }
  .svc-check svg{ width:11px; height:11px; opacity:0; transition:opacity .15s ease; }
  .svc.selected .svc-check svg{ opacity:1; }
  .svc-name{ font-size:15px; font-weight:500; color:var(--ivory); }
  .svc-desc{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .svc-right{ margin-left:auto; text-align:right; flex-shrink:0; padding-left:14px; }
  .svc-price{ font-size:15px; font-weight:600; color:var(--gold-soft); font-family:'Fraunces',serif; font-style:italic; }
  .svc-dur{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .empty-msg{ padding:2rem 4px; color:var(--muted); font-size:13.5px; text-align:center; }

  .summary{ background:var(--surface-2); border:1px solid var(--line); padding:1.4rem; position:sticky; top:100px; }
  .summary h3{ font-size:1rem; margin-bottom:1rem; color:var(--gold-soft); }
  .summary-empty{ font-size:13px; color:var(--muted); }
  .summary-item{
    display:flex; justify-content:space-between; font-size:13px; padding:7px 0;
    border-bottom:1px dashed var(--line); gap:8px; color:var(--ivory-dim);
  }
  .summary-item span:first-child{ color:var(--muted); }
  .summary-item b{ font-weight:600; white-space:nowrap; color:var(--ivory); }
  .summary-total{
    display:flex; justify-content:space-between; font-size:1.05rem; font-weight:500;
    margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--gold);
    font-family:'Fraunces',serif; color:var(--gold-soft);
  }
  .summary-meta{ font-size:12px; color:var(--muted); margin-top:.7rem; line-height:1.5; }

  .dates{ display:flex; gap:9px; overflow-x:auto; padding-bottom:6px; margin-bottom:1.6rem; }
  .date-chip{
    flex-shrink:0; width:64px; padding:11px 0; border:1.5px solid var(--line);
    text-align:center; cursor:pointer; background:var(--surface-2);
  }
  .date-chip.active{ background:var(--gold); border-color:var(--gold); }
  .date-chip .dow{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .date-chip.active .dow{ color:rgba(21,15,18,0.65); }
  .date-chip .dnum{ font-family:'Fraunces', serif; font-size:19px; font-weight:600; margin-top:2px; color:var(--ivory); }
  .date-chip.active .dnum{ color:var(--ink); }

  .slots{ display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:9px; }
  .slot{
    border:1.5px solid var(--line); padding:10px 0; text-align:center;
    font-size:13px; font-weight:500; cursor:pointer; background:var(--surface-2); color:var(--ivory-dim);
  }
  .slot.active{ background:var(--gold); border-color:var(--gold); color:var(--ink); font-weight:600; }
  .slot.disabled{ opacity:.3; cursor:not-allowed; text-decoration:line-through; }

  .field{ margin-bottom:1rem; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:6px; }
  .field input,.field textarea{
    width:100%; border:1.5px solid var(--line); background:var(--surface-2);
    padding:11px 13px; font-size:14.5px; font-family:inherit; color:var(--ivory); outline:none;
  }
  .field input::placeholder,.field textarea::placeholder{ color:var(--muted); }
  .field input:focus,.field textarea:focus{ border-color:var(--gold); }
  .field textarea{ resize:vertical; min-height:70px; }

  .nav-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:2rem; padding-top:1.4rem; border-top:1px solid var(--line);
  }
  .btn{
    border:1px solid transparent; padding:13px 26px; font-size:.8rem; font-weight:600;
    letter-spacing:.08em; text-transform:uppercase; cursor:pointer; font-family:inherit;
    transition:all .2s ease;
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn-primary{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
  .btn-primary:hover:not(:disabled){ background:transparent; color:var(--gold-soft); }
  .btn-ghost{ background:transparent; color:var(--muted); }
  .btn-ghost:hover{ color:var(--ivory); }

  .confirm-box{ text-align:center; padding:1.4rem 0 .4rem; }
  .confirm-icon{
    width:56px; height:56px; border-radius:50%; background:var(--good);
    display:flex; align-items:center; justify-content:center; margin:0 auto 1.2rem;
  }
  .confirm-box h2{ font-size:1.7rem; margin-bottom:.5rem; color:var(--ivory); }
  .confirm-box p{ color:var(--muted); font-size:.92rem; max-width:360px; margin:0 auto 1.5rem; }
  .wa-btn{
    display:inline-flex; align-items:center; gap:9px; background:#25D366; color:#fff;
    padding:13px 24px; text-decoration:none; font-weight:600; font-size:.85rem;
  }

  ::-webkit-scrollbar{ height:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 3C6 3 3 8 3 13C3 17.4183 6.58172 21 11 21C15.4183 21 19 17.4183 19 13C19 8 15 6 15 6C15 6 16 9 14 11C14 8 12 5 9 4C10 6 9 8 7 9C7 6 6 3 6 3Z" fill="#C9A24A"/></svg>
    </span>
    <span class="wordmark">Cut N Cute <span>Studio</span><small>Unisex Salon</small></span>
  </a>
  <a href="index.html" class="back-link">← Back to site</a>
</header>

<div class="wrap">
  <div class="stepper" id="stepper"></div>
  <div class="card" id="card"></div>
</div>

<script>
const SHEET_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw0ssj_vNZIawHYVtG9a5oI2v5goPPgmGUaV6Ng38MgfveY3j844XjE5PDfSyxrzeAu/exec';

const SERVICES = [
  {id:1, cat:'Hair', name:'Signature Haircut — Women', price:399, dur:45, desc:'Wash, consultation, cut & style shaped around your face.'},
  {id:2, cat:'Hair', name:'Signature Haircut — Men', price:99, dur:30, desc:'Intro offer — wash, consultation, cut & style.'},
  {id:3, cat:'Colour', name:'Colour & Highlights', price:1499, dur:90, desc:'Soft balayage to full colour, mixed fresh for your tone.'},
  {id:4, cat:'Style', name:'Blowout & Styling', price:599, dur:45, desc:'Event-ready hair in under an hour.'},
  {id:5, cat:'Kids', name:"Kids' Cut", price:249, dur:30, desc:'Patient stylists, calm chair — ages 3 to 12.'},
  {id:6, cat:'Grooming', name:'Beard & Grooming', price:200, dur:20, desc:'Sharp lines and a hot towel finish.'},
  {id:7, cat:'Treatment', name:'Deep Repair Treatment', price:1299, dur:60, desc:'Keratin, protein & moisture for tired hair.'},
];
const CATEGORIES = ['All','Hair','Colour','Style','Kids','Grooming','Treatment'];

let state = {
  step: 1, search: '', activeCat: 'All', selected: [],
  dateIdx: 0, time: null, name: '', phone: '', notes: ''
};

const STORE_PHONE = '917996700707';
const STORE_NAME = 'Cut N Cute Studio';

function money(n){ return '\u20B9' + n.toLocaleString('en-IN'); }

function nextDays(n){
  const out = []; const today = new Date();
  for(let i=0;i<n;i++){ const d = new Date(today); d.setDate(today.getDate()+i); out.push(d); }
  return out;
}
const DATES = nextDays(14);

function timeSlots(date){
  const slots = [];
  const isToday = date.toDateString() === new Date().toDateString();
  const now = new Date();
  for(let h=8; h<22; h++){
    for(let m=0; m<60; m+=30){
      if(h===21 && m>30) continue;
      const label = new Date(0,0,0,h,m).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      let disabled = false;
      if(isToday){
        const slotTime = new Date(date); slotTime.setHours(h,m,0,0);
        if(slotTime < now) disabled = true;
      }
      slots.push({label, disabled});
    }
  }
  return slots;
}

function renderStepper(){
  const labels = ['Services','Date & Time','Confirm'];
  const el = document.getElementById('stepper');
  el.innerHTML = labels.map((l,i)=>{
    const n = i+1;
    const cls = n < state.step ? 'done' : (n === state.step ? 'active' : '');
    const line = i < labels.length-1 ? '<div class="step-line"></div>' : '';
    const inner = n < state.step
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : n;
    return `<div class="step ${cls}"><div class="step-num">${inner}</div><div class="step-label">${l}</div></div>${line}`;
  }).join('');
}

function filteredServices(){
  return SERVICES.filter(s=>{
    const matchCat = state.activeCat === 'All' || s.cat === state.activeCat;
    const matchSearch = s.name.toLowerCase().includes(state.search.toLowerCase());
    return matchCat && matchSearch;
  });
}

function summaryHTML(){
  if(state.selected.length === 0){
    return `<div class="summary"><h3>Your Chair</h3><div class="summary-empty">Select a service to begin.</div></div>`;
  }
  const items = state.selected.map(id=>{
    const s = SERVICES.find(x=>x.id===id);
    return `<div class="summary-item"><span>${s.name}</span><b>${money(s.price)}</b></div>`;
  }).join('');
  const total = state.selected.reduce((sum,id)=> sum + SERVICES.find(x=>x.id===id).price, 0);
  const dur = state.selected.reduce((sum,id)=> sum + SERVICES.find(x=>x.id===id).dur, 0);
  let meta = `${state.selected.length} service${state.selected.length>1?'s':''} · ~${dur} min`;
  if(state.step >= 2 && state.time){
    meta += `<br>${DATES[state.dateIdx].toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'})} · ${state.time}`;
  }
  return `<div class="summary"><h3>Your Chair</h3>${items}<div class="summary-total"><span>Total</span><span>${money(total)}</span></div><div class="summary-meta">${meta}</div></div>`;
}

function renderServicesStep(){
  const list = filteredServices();
  const grouped = {};
  list.forEach(s=>{ (grouped[s.cat] = grouped[s.cat] || []).push(s); });

  let listHTML = '';
  if(list.length === 0){
    listHTML = `<div class="empty-msg">No services match your search.</div>`;
  } else {
    Object.keys(grouped).forEach(cat=>{
      listHTML += `<div class="cat-label">${cat}</div>`;
      grouped[cat].forEach(s=>{
        const sel = state.selected.includes(s.id);
        listHTML += `
          <div class="svc ${sel?'selected':''}" onclick="toggleService(${s.id})">
            <div class="svc-check"><svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#150F12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div>
              <div class="svc-name">${s.name}</div>
              <div class="svc-desc">${s.desc}</div>
            </div>
            <div class="svc-right">
              <div class="svc-price">${money(s.price)}</div>
              <div class="svc-dur">${s.dur} min</div>
            </div>
          </div>`;
      });
    });
  }

  document.getElementById('card').innerHTML = `
    <h1>Select Services</h1>
    <div class="sub">Location: <b>Kodihalli, Bengaluru</b> · Select one or more services</div>
    <div class="layout">
      <div>
        <div class="search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="searchInput" placeholder="Search services — haircut, colour, beard..." value="${state.search}">
        </div>
        <div class="pills">
          ${CATEGORIES.map(c=>`<div class="pill ${state.activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('')}
        </div>
        <div>${listHTML}</div>
      </div>
      ${summaryHTML()}
    </div>
    <div class="nav-row">
      <div></div>
      <button class="btn btn-primary" ${state.selected.length===0?'disabled':''} onclick="goStep(2)">Continue</button>
    </div>
  `;
  document.getElementById('searchInput').addEventListener('input', e=>{
    state.search = e.target.value; renderServicesStep();
    const inp = document.getElementById('searchInput');
    inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
  });
}

function toggleService(id){
  const i = state.selected.indexOf(id);
  if(i>-1) state.selected.splice(i,1); else state.selected.push(id);
  renderServicesStep();
}
function setCat(c){ state.activeCat = c; renderServicesStep(); }

function renderDateTimeStep(){
  const dateChips = DATES.map((d,i)=>{
    const isToday = i===0;
    return `<div class="date-chip ${state.dateIdx===i?'active':''}" onclick="setDate(${i})">
      <div class="dow">${isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="dnum">${d.getDate()}</div>
    </div>`;
  }).join('');

  const slots = timeSlots(DATES[state.dateIdx]);
  const slotHTML = slots.map(s=>{
    const cls = s.disabled ? 'disabled' : (state.time===s.label ? 'active' : '');
    return `<div class="slot ${cls}" ${s.disabled?'':`onclick="setTime('${s.label}')"`}>${s.label}</div>`;
  }).join('');

  document.getElementById('card').innerHTML = `
    <h1>Pick a Date &amp; Time</h1>
    <div class="sub">Open <b>8:00 AM – 10:00 PM</b>, every day</div>
    <div class="layout">
      <div>
        <div class="dates">${dateChips}</div>
        <div class="slots">${slotHTML}</div>
      </div>
      ${summaryHTML()}
    </div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goStep(1)">Back</button>
      <button class="btn btn-primary" ${!state.time?'disabled':''} onclick="goStep(3)">Continue</button>
    </div>
  `;
}
function setDate(i){ state.dateIdx = i; state.time = null; renderDateTimeStep(); }
function setTime(t){ state.time = t; renderDateTimeStep(); }

function renderConfirmStep(){
  document.getElementById('card').innerHTML = `
    <h1>Your Details</h1>
    <div class="sub">We'll confirm your chair over WhatsApp</div>
    <div class="layout">
      <div>
        <div class="field"><label>Full Name</label><input id="fName" value="${state.name}" placeholder="e.g. Ananya Rao"></div>
        <div class="field"><label>Phone Number</label><input id="fPhone" value="${state.phone}" placeholder="e.g. 98765 43210"></div>
        <div class="field"><label>Notes for your stylist (optional)</label><textarea id="fNotes" placeholder="Allergies, preferences, anything we should know...">${state.notes}</textarea></div>
      </div>
      ${summaryHTML()}
    </div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goStep(2)">Back</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="submitBooking()">Confirm Booking</button>
    </div>
  `;
  ['fName','fPhone','fNotes'].forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      if(id==='fName') state.name = e.target.value;
      if(id==='fPhone') state.phone = e.target.value;
      if(id==='fNotes') state.notes = e.target.value;
    });
  });
}

function submitBooking(){
  if(!state.name.trim() || !state.phone.trim()){
    alert('Please add your name and phone number.');
    return;
  }
  const services = state.selected.map(id=>SERVICES.find(s=>s.id===id).name).join(', ');
  const total = state.selected.reduce((sum,id)=> sum + SERVICES.find(x=>x.id===id).price, 0);
  const dateStr = DATES[state.dateIdx].toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'});
  const msg = `Hi ${STORE_NAME}! I'd like to book:\n${services}\n${dateStr} at ${state.time}\nName: ${state.name}\nPhone: ${state.phone}${state.notes?'\nNotes: '+state.notes:''}\nTotal: ${money(total)}`;
  const waLink = `https://wa.me/${STORE_PHONE}?text=${encodeURIComponent(msg)}`;

  fetch(SHEET_WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      name: state.name,
      phone: state.phone,
      services: services,
      date: dateStr,
      time: state.time,
      total: total,
      notes: state.notes
    })
  }).catch(err => console.warn('Sheet log failed silently:', err));

  document.getElementById('card').innerHTML = `
    <div class="confirm-box">
      <div class="confirm-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h2>Almost there, ${state.name.split(' ')[0]}</h2>
      <p>Tap below to send your booking request on WhatsApp — we'll confirm your chair right there.</p>
      <a class="wa-btn" href="${waLink}" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.07-1.32A9.94 9.94 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.6 0-3.1-.44-4.38-1.2l-.31-.18-3 .78.8-2.93-.2-.3A7.94 7.94 0 0 1 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
        Send on WhatsApp
      </a>
    </div>
  `;
}

function goStep(n){ state.step = n; renderStepper(); render(); window.scrollTo({top:0, behavior:'smooth'}); }

function render(){
  if(state.step === 1) renderServicesStep();
  else if(state.step === 2) renderDateTimeStep();
  else if(state.step === 3) renderConfirmStep();
}

renderStepper();
render();
</script>
</body>
</html>
